name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/lovepiment_ci
      DIRECT_URL: postgresql://postgres:password@localhost:5432/lovepiment_ci
      AUTH_SECRET: ci-auth-secret-min-16-chars
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NODE_ENV: test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: lovepiment_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d lovepiment_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Sync database schema
        run: npx prisma db push --accept-data-loss

      - name: Production build
        run: npm run build
